apiVersion: apps/v1
kind: Deployment
metadata:
  name: shop-service
  namespace: catering-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shop-service
  template:
    metadata:
      labels:
        app: shop-service
    spec:
      containers:
        - name: shop-service
          image: shop-service:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/shop_service?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: catering-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: catering-services-config
                  key: REDIS_HOST
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                configMapKeyRef:
                  name: catering-services-config
                  key: EUREKA_DEFAULT_ZONE
---
apiVersion: v1
kind: Service
metadata:
  name: shop-service
  namespace: catering-dev
spec:
  selector:
    app: shop-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
