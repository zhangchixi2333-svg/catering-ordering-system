      {{- include "catering.selectorLabels" (dict "name" "frontend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "catering.selectorLabels" (dict "name" "frontend") | nindent 8 }}
        {{- include "catering.labels" (dict "name" "frontend" "root" $) | nindent 8 }}
    spec:
      containers:
        - name: frontend
          image: {{ .Values.frontend.image | quote }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ .Values.namespace | quote }}
  labels:
    {{- include "catering.labels" (dict "name" "frontend" "root" $) | nindent 4 }}
spec:
  type: {{ .Values.frontend.serviceType }}
  selector:
    {{- include "catering.selectorLabels" (dict "name" "frontend") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.frontend.port }}
      targetPort: {{ .Values.frontend.port }}
