apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: {{ .Values.namespace | quote }}
  labels:
    {{- include "catering.labels" (dict "name" "mysql" "root" $) | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: {{ .Values.namespace | quote }}
  labels:
    {{- include "catering.labels" (dict "name" "mysql" "root" $) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "catering.selectorLabels" (dict "name" "mysql") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "catering.selectorLabels" (dict "name" "mysql") | nindent 8 }}
        {{- include "catering.labels" (dict "name" "mysql" "root" $) | nindent 8 }}
    spec:
      containers:
        - name: mysql
          image: {{ .Values.mysql.image | quote }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.mysql.port }}
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: catering-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: TZ
              value: Asia/Shanghai
          args:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: {{ .Values.namespace | quote }}
  labels:
    {{- include "catering.labels" (dict "name" "mysql" "root" $) | nindent 4 }}
spec:
  selector:
    {{- include "catering.selectorLabels" (dict "name" "mysql") | nindent 4 }}
  ports:
    - name: mysql
      port: {{ .Values.mysql.port }}
      targetPort: {{ .Values.mysql.port }}
---
