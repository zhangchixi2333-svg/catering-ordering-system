server:
  port: 8086

spring:
  application:
    name: notification-service
  
  # RabbitMQ配置
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  
  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 4

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: org.example.notificationservice.entity
  configuration:
    map-underscore-to-camel-case: true

# Knife4j配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn

# 日志配置
logging:
  level:
    root: INFO
    org.example.notificationservice: DEBUG
    org.springframework.web.servlet.resource.ResourceHttpRequestHandler: WARN
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
